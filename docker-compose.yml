version: '3.8'

services:
  db:
    image: postgres:17-alpine
    container_name: fintech_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fintech_wallet
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: fintech_redis
    restart: always
    ports:
      - '6380:6379'
    volumes:
      - redisdata:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fintech_app
    restart: always
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:password@db:5432/fintech_wallet?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=supersecretjwtkey_change_me_in_prod
    depends_on:
      - db
      - redis
    command: npm run dev

volumes:
  pgdata:
  redisdata:
