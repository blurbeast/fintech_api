version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: fintech_db
    restart: always
    env_file:
      - .env
    ports:
      - '${DB_HOST_PORT:-5433}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: fintech_redis
    restart: always
    ports:
      - '${REDIS_HOST_PORT:-6380}:6379'
    volumes:
      - redisdata:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fintech_app
    restart: always
    ports:
      - '${APP_HOST_PORT:-3001}:${PORT:-3000}'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-fintech_wallet}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - db
      - redis

volumes:
  pgdata:
  redisdata:
